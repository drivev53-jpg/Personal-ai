<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Fox Chat · premium</title>

  <!-- Tailwind + Marked + Font Awesome + Highlight.js -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <style>
    /* ----- base & wallpaper ----- */
    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --bg-dark: #0a0a0b;
      --bg-light: #f9fafb;
      --glass-bg: rgba(20, 20, 22, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }
    /* wallpaper layer */
    .bg-wall {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
      background: #0a0a0b;
    }
    .bg-wall::before {
      content: ''; position: absolute; inset: -10px;
      background-image: url('https://ahmed4real.neocities.org/ef15b4fb871dc3eb569f69d76fead0d5.jpg');
      background-size: cover; background-position: center; filter: blur(12px); z-index: 1;
    }
    .bg-wall::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.65); z-index: 2;
    }
    .glow-orb {
      position: absolute; width: 400px; height: 400px; border-radius: 50%;
      background: var(--primary); opacity: 0.1; filter: blur(100px);
      animation: move 25s infinite alternate ease-in-out; z-index: 3;
    }
    .glow-orb.purple { background: #8b5cf6; opacity: 0.08; }
    @keyframes move { 0% { transform: translate(-20%, -20%); } 100% { transform: translate(120%, 120%); } }

    /* glass components */
    .glass {
      background: rgba(20, 20, 22, 0.4);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.6);
    }
    .glass-pill {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* theme classes */
    body.dark { background: #0a0a0b; color: white; }
    body.light { background: #f9fafb; color: #111827; }
    body.light .glass { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.1); }
    body.light .glass-pill { background: rgba(255,255,255,0.7); }
    body.glass { background: transparent; color: white; }
    body.glass .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    body.purple { --primary: #8b5cf6; --primary-dark: #7c3aed; background: #1e1b4b; color: white; }
    body.purple .glass { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.3); }

    /* message bubbles */
    .message-user {
      background: var(--primary);
      color: white;
      border-radius: 1.5rem 1.5rem 0 1.5rem;
    }
    .message-ai {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem 1.5rem 1.5rem 0;
      color: #e5e7eb;
    }
    body.light .message-ai { background: white; color: #111827; border-color: #e5e7eb; }

    /* animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.3s ease-out forwards; }

    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .animate-pulse-slow { animation: pulse 2s infinite; }

    @keyframes bounce {
      0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)}
    }
    .typing-dots span {
      width: 8px; height: 8px; margin: 0 2px; background: var(--primary); border-radius: 50%;
      display: inline-block; animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    /* toast */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #1e1e24; color: white; padding: 0.75rem 1.5rem; border-radius: 2rem;
      font-size: 0.9rem; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 1000;
      transition: opacity 0.3s; opacity: 0; pointer-events: none;
      border: 1px solid var(--primary); backdrop-filter: blur(10px);
    }
    .toast-show { opacity: 1 !important; }

    /* editing highlight */
    .editing-message { outline: 2px solid var(--primary); outline-offset: 4px; filter: drop-shadow(0 0 10px var(--primary)); }

    /* saved chats button (orange pill) */
    .saved-btn {
      background: #ff7a00;
      color: black;
      font-weight: bold;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 0 15px #ff7a00aa;
      transition: all 0.2s;
    }
    .saved-btn:hover { background: #ffa94d; transform: scale(1.02); }

    /* sidebar transitions */
    #sidebar { transition: transform 0.3s ease; }
    .sidebar-hidden { transform: translateX(-100%); }
  </style>
</head>
<body class="dark">
  <div class="bg-wall">
    <div class="glow-orb" style="top:10%;left:10%"></div>
    <div class="glow-orb purple" style="bottom:10%;right:10%"></div>
  </div>
  <div id="toast">✨ Copied</div>

  <!-- settings modal (simplified: only API key + model + image engine) -->
  <div id="settingsModal" class="fixed inset-0 flex items-center justify-center p-4 z-[1000] hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="toggleSettings()"></div>
    <div class="glass w-full max-w-md p-8 rounded-[2rem] relative z-10">
      <h3 class="text-xl font-black mb-4 text-primary">Settings</h3>
      <div class="space-y-4">
        <input type="password" id="apiKeyInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-primary" placeholder="OpenRouter API Key">
        <input type="text" id="modelInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-primary" placeholder="Custom model ID (e.g. google/gemini-2.0-flash-exp:free)">
        <select id="imageEngineSelect" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-primary">
          <option value="pollinations">Pollinations (free)</option>
          <option value="openrouter">OpenRouter (uses API key)</option>
        </select>
      </div>
      <div class="flex gap-2 mt-6">
        <button onclick="saveSettings()" class="flex-1 py-3 bg-primary text-black font-bold rounded-xl">Save</button>
        <button onclick="toggleSettings()" class="flex-1 py-3 bg-white/10 rounded-xl">Cancel</button>
      </div>
    </div>
  </div>

  <!-- system prompt modal -->
  <div id="systemModal" class="fixed inset-0 flex items-center justify-center p-4 z-[1000] hidden">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeSystemModal()"></div>
    <div class="glass w-full max-w-md p-8 rounded-[2rem] relative z-10">
      <h3 class="text-xl font-black mb-4 text-primary">System prompt</h3>
      <textarea id="systemInput" rows="5" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-primary mb-4" placeholder="You are a helpful assistant..."></textarea>
      <div class="flex gap-2">
        <button onclick="saveSystemPrompt()" class="flex-1 py-3 bg-primary text-black font-bold rounded-xl">Save</button>
        <button onclick="closeSystemModal()" class="flex-1 py-3 bg-white/10 rounded-xl">Cancel</button>
      </div>
    </div>
  </div>

  <!-- main layout -->
  <div class="flex h-full w-full relative">
    <!-- sidebar -->
    <aside id="sidebar" class="w-80 h-full glass absolute md:relative sidebar-hidden md:translate-x-0 flex flex-col p-6 z-50 overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <img src="https://t3.ftcdn.net/jpg/08/63/01/66/360_F_863016640_fdXeQ7Olm2XJv7BulETweOBaRlUg4lLL.jpg" class="w-8 h-8 rounded-lg animate-pulse-slow">
          <h2 class="text-primary font-black tracking-tighter text-xl">FOX CHAT</h2>
        </div>
        <button onclick="toggleSidebar(false)" class="md:hidden text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
      </div>

      <!-- new chat button -->
      <button onclick="createNewChat()" class="w-full py-3 px-4 bg-primary/10 border border-primary/20 rounded-2xl text-primary font-bold text-sm mb-6 flex items-center justify-center gap-2">
        <i class="fa-solid fa-plus"></i> New Chat
      </button>

      <!-- saved chats list -->
      <div class="flex-1 overflow-y-auto" id="chatListContainer"></div>

      <!-- bottom buttons -->
      <div class="mt-6 space-y-2">
        <button onclick="openSystemModal()" class="w-full p-4 rounded-2xl bg-white/5 hover:border-primary/30 transition flex items-center gap-3">
          <i class="fa-regular fa-message text-primary"></i><span class="text-xs font-bold uppercase">System Prompt</span>
        </button>
        <button onclick="toggleSettings()" class="w-full p-4 rounded-2xl bg-white/5 hover:border-primary/30 transition flex items-center gap-3">
          <i class="fa-solid fa-sliders text-primary"></i><span class="text-xs font-bold uppercase">Settings</span>
        </button>
        <!-- theme selector -->
        <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5">
          <span class="text-xs font-bold uppercase">Theme</span>
          <select id="themeSelect" onchange="setTheme(this.value)" class="bg-transparent text-xs border border-white/10 rounded-lg p-1">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="glass">Glass</option>
            <option value="purple">Purple</option>
          </select>
        </div>
        <!-- clear all chats -->
        <button onclick="clearAllChats()" class="w-full p-4 rounded-2xl bg-white/5 hover:bg-red-500/20 transition flex items-center gap-3">
          <i class="fa-regular fa-trash-can text-red-400"></i><span class="text-xs font-bold uppercase">Clear all</span>
        </button>
        <!-- export current chat -->
        <button onclick="exportChatTxt()" class="w-full p-4 rounded-2xl bg-white/5 hover:bg-primary/20 transition flex items-center gap-3">
          <i class="fa-regular fa-file-lines text-primary"></i><span class="text-xs font-bold uppercase">Export .txt</span>
        </button>
      </div>
    </aside>

    <!-- main chat area -->
    <main class="flex-1 flex flex-col h-full relative min-w-0">
      <!-- header with hamburger + saved button + theme label -->
      <header class="p-4 flex items-center justify-between z-40 glass border-b border-white/10">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar(true)" class="p-2 bg-white/5 rounded-xl md:hidden"><i class="fa-solid fa-bars-staggered text-primary"></i></button>
          <button onclick="toggleSidebar(true)" class="saved-btn hidden md:flex">
            <i class="fa-regular fa-bookmark"></i> Saved Chats
          </button>
        </div>
        <span class="text-xs font-black text-gray-400 uppercase" id="headerModel">custom model</span>
        <!-- mobile saved button (always visible) -->
        <button onclick="toggleSidebar(true)" class="saved-btn md:hidden">
          <i class="fa-regular fa-bookmark"></i>
        </button>
      </header>

      <!-- chat messages container (scrollable) -->
      <div id="chatContainer" class="flex-1 overflow-y-auto px-4 md:px-8 py-6 space-y-4"></div>

      <!-- edit indicator bar -->
      <div id="editIndicator" class="hidden px-4 md:px-8 py-2 flex items-center gap-2 text-sm text-primary bg-primary/10 border-t border-primary/20">
        <i class="fa-regular fa-pen-to-square"></i> Editing message...
        <button onclick="cancelEdit()" class="ml-auto text-xs bg-white/10 px-3 py-1 rounded-full">Cancel</button>
      </div>

      <!-- input area (ChatGPT style) -->
      <div class="sticky bottom-0 w-full px-4 pb-4 pt-2 z-40">
        <div class="glass-pill flex items-center gap-2 rounded-full p-1 border border-white/10 focus-within:border-primary transition-shadow">
          <button id="attachBtn" class="w-10 h-10 flex items-center justify-center text-white/80 hover:text-primary"><i class="fa-solid fa-plus text-xl"></i></button>
          <textarea id="messageInput" rows="1" placeholder="Reply to AI" class="flex-1 bg-transparent py-3 outline-none resize-none text-sm text-white placeholder-white/50 max-h-32"></textarea>
          <button id="voiceBtn" class="w-10 h-10 flex items-center justify-center text-white/80 hover:text-primary"><i class="fa-solid fa-microphone text-xl"></i></button>
          <button id="sendBtn" class="w-10 h-10 bg-gradient-to-r from-primary to-blue-500 rounded-full text-black shadow-lg hover:scale-105 transition-transform hidden"><i class="fa-solid fa-paper-plane text-sm"></i></button>
          <button id="stopBtn" class="w-10 h-10 bg-red-500/80 rounded-full text-white shadow-lg hover:scale-105 transition-transform hidden"><i class="fa-solid fa-stop text-sm"></i></button>
        </div>
        <div class="text-right text-xs text-gray-500 mt-1 px-2" id="charCounter">0 characters</div>
      </div>
    </main>
  </div>

  <!-- hidden file input -->
  <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">

  <!-- voice modal (simplified, with fixed word repetition) -->
  <div id="voiceModal" class="fixed inset-0 z-[10000] hidden items-end">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeVoiceModal()"></div>
    <div class="relative w-full glass-panel rounded-t-[2rem] p-8 pb-10 animate-slideUp bg-black/40 border-t border-primary/30">
      <div class="w-12 h-1 bg-white/30 rounded-full mx-auto mb-6"></div>
      <div id="voiceTranscript" class="text-center text-xl font-light text-white/90 min-h-[3rem] mb-4"></div>
      <div class="flex justify-center gap-4">
        <button onclick="stopVoiceRecording()" class="px-6 py-3 bg-red-500/20 rounded-full border border-red-500/30 hover:bg-red-500/40"><i class="fa-solid fa-stop mr-2"></i>Stop</button>
        <button onclick="cancelVoiceRecording()" class="px-6 py-3 bg-white/10 rounded-full border border-white/20 hover:bg-white/20">Cancel</button>
        <button onclick="insertVoiceText()" class="px-6 py-3 bg-primary rounded-full text-black font-bold hover:bg-primary/80">Insert</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- MODULES -----
      const StorageManager = {
        getChats: () => JSON.parse(localStorage.getItem('foxChats') || '[]'),
        saveChats: (chats) => localStorage.setItem('foxChats', JSON.stringify(chats)),
        getApiKey: () => localStorage.getItem('foxApiKey') || '',
        setApiKey: (key) => localStorage.setItem('foxApiKey', key),
        getModel: () => localStorage.getItem('foxModel') || 'google/gemini-2.0-flash-exp:free',
        setModel: (model) => localStorage.setItem('foxModel', model),
        getImageEngine: () => localStorage.getItem('foxImageEngine') || 'pollinations',
        setImageEngine: (eng) => localStorage.setItem('foxImageEngine', eng),
        getTheme: () => localStorage.getItem('foxTheme') || 'dark',
        setTheme: (t) => localStorage.setItem('foxTheme', t),
        getSystemPrompt: (chatId) => {
          const chats = StorageManager.getChats();
          const chat = chats.find(c => c.id === chatId);
          return chat ? chat.systemPrompt : '';
        },
        saveSystemPrompt: (chatId, prompt) => {
          const chats = StorageManager.getChats();
          const chat = chats.find(c => c.id === chatId);
          if (chat) chat.systemPrompt = prompt;
          StorageManager.saveChats(chats);
        }
      };

      let currentChatId = null;
      let chats = StorageManager.getChats();
      if (!chats.length) {
        const id = Date.now().toString();
        chats = [{ id, title: 'New chat', messages: [], systemPrompt: '' }];
        StorageManager.saveChats(chats);
      }
      if (!chats.find(c => c.id === currentChatId)) currentChatId = chats[0].id;

      // UI elements
      const chatContainer = document.getElementById('chatContainer');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const stopBtn = document.getElementById('stopBtn');
      const voiceBtn = document.getElementById('voiceBtn');
      const attachBtn = document.getElementById('attachBtn');
      const imageUpload = document.getElementById('imageUpload');
      const editIndicator = document.getElementById('editIndicator');
      const charCounter = document.getElementById('charCounter');
      const headerModel = document.getElementById('headerModel');
      const themeSelect = document.getElementById('themeSelect');
      const settingsModal = document.getElementById('settingsModal');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const modelInput = document.getElementById('modelInput');
      const imageEngineSelect = document.getElementById('imageEngineSelect');
      const systemModal = document.getElementById('systemModal');
      const systemInput = document.getElementById('systemInput');
      const voiceModal = document.getElementById('voiceModal');
      const voiceTranscript = document.getElementById('voiceTranscript');

      // state
      let editMode = { active: false, messageId: null, index: -1 };
      let selectedImages = [];
      let abortController = null;
      let isGenerating = false;

      // init theme
      const currentTheme = StorageManager.getTheme();
      document.body.className = currentTheme;
      themeSelect.value = currentTheme;

      // helper
      function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('toast-show');
        setTimeout(() => toast.classList.remove('toast-show'), 3000);
      }

      function currentChat() {
        return chats.find(c => c.id === currentChatId) || chats[0];
      }

      function saveChats() {
        StorageManager.saveChats(chats);
        renderChatList();
      }

      // ----- CHAT LIST RENDER -----
      function renderChatList() {
        const container = document.getElementById('chatListContainer');
        container.innerHTML = '';
        chats.forEach(chat => {
          const active = chat.id === currentChatId ? 'bg-primary/20 border border-primary/30' : 'hover:bg-white/5';
          const div = document.createElement('div');
          div.className = `p-3 rounded-xl cursor-pointer transition-all flex items-center gap-2 group ${active}`;
          div.innerHTML = `
            <div class="flex-1 min-w-0" onclick="window.selectChat('${chat.id}')">
              <div class="text-sm font-medium truncate">${chat.title}</div>
              <div class="text-xs text-gray-400">${chat.messages.length} msgs</div>
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition">
              <button onclick="window.renameChat('${chat.id}')" class="p-1 hover:text-primary"><i class="fa-regular fa-pen-to-square text-xs"></i></button>
              <button onclick="window.deleteChat('${chat.id}')" class="p-1 hover:text-red-500"><i class="fa-regular fa-trash-can text-xs"></i></button>
            </div>
          `;
          container.appendChild(div);
        });
      }

      window.selectChat = (id) => {
        currentChatId = id;
        editMode.active = false;
        editIndicator.classList.add('hidden');
        renderMessages();
        renderChatList();
        if (window.innerWidth < 768) toggleSidebar(false);
      };

      window.renameChat = (id) => {
        const chat = chats.find(c => c.id === id);
        const newTitle = prompt('Rename chat:', chat.title);
        if (newTitle && newTitle.trim()) {
          chat.title = newTitle.trim();
          saveChats();
          renderChatList();
        }
      };

      window.deleteChat = (id) => {
        if (chats.length === 1) {
          alert('Cannot delete the only chat.');
          return;
        }
        if (confirm('Delete this chat?')) {
          chats = chats.filter(c => c.id !== id);
          if (currentChatId === id) currentChatId = chats[0].id;
          saveChats();
          renderMessages();
          renderChatList();
        }
      };

      window.createNewChat = () => {
        const id = Date.now().toString();
        chats.push({ id, title: 'New chat', messages: [], systemPrompt: '' });
        currentChatId = id;
        saveChats();
        renderMessages();
        renderChatList();
        toggleSidebar(false);
      };

      window.clearAllChats = () => {
        if (confirm('Delete all chats?')) {
          const id = Date.now().toString();
          chats = [{ id, title: 'New chat', messages: [], systemPrompt: '' }];
          currentChatId = id;
          saveChats();
          renderMessages();
          renderChatList();
        }
      };

      // ----- MESSAGE RENDERING (append-only) -----
      function renderMessages() {
        const chat = currentChat();
        chatContainer.innerHTML = ''; // initial load only – after that we append
        chat.messages.forEach((msg, idx) => appendMessage(msg, idx));
        scrollToBottom();
      }

      function appendMessage(msg, index) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-4 animate-fadeInUp`;
        msgDiv.dataset.id = msg.id;
        if (editMode.active && editMode.messageId === msg.id) msgDiv.classList.add('editing-message');

        const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';

        if (msg.role === 'user') {
          let imagesHtml = '';
          if (msg.images && msg.images.length) {
            imagesHtml = '<div class="flex flex-wrap gap-2 mb-2">' + msg.images.map(src => `<img src="${src}" class="max-w-[150px] max-h-[150px] rounded-2xl border-2 border-primary/30 cursor-zoom-in" onclick="zoomImage('${src}')">`).join('') + '</div>';
          }
          msgDiv.innerHTML = `
            <div class="max-w-[85%]">
              <div class="px-4 py-2 rounded-[1.5rem] rounded-tr-none text-sm message-user relative">
                ${imagesHtml}
                <div>${marked.parse(msg.text || msg.content || '')}</div>
                <div class="text-[10px] text-white/70 text-right mt-1">${time}</div>
              </div>
              <div class="flex justify-end gap-2 mt-1 text-xs text-gray-400">
                <button onclick="editMessage('${msg.id}')" class="hover:text-primary"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
              </div>
            </div>
          `;
        } else {
          const isImg = msg.isImg || false;
          let contentHtml = isImg ? `<img src="${msg.content}" class="rounded-3xl max-w-sm w-full glass p-2 shadow-2xl cursor-zoom-in" onclick="zoomImage('${msg.content}')">` : `<div class="prose prose-invert prose-primary text-sm message-ai-content">${marked.parse(msg.content)}</div>`;
          msgDiv.innerHTML = `
            <div class="flex gap-3 w-full">
              <img src="https://t3.ftcdn.net/jpg/08/63/01/66/360_F_863016640_fdXeQ7Olm2XJv7BulETweOBaRlUg4lLL.jpg" class="w-8 h-8 rounded-xl border border-white/10 flex-shrink-0">
              <div class="flex-1 overflow-hidden">
                <div class="message-ai p-4 rounded-[1.5rem] rounded-tl-none relative">
                  ${contentHtml}
                  <div class="text-[10px] text-gray-400 text-right mt-1">${time}</div>
                </div>
                <div class="flex items-center gap-3 mt-2 text-gray-400 message-actions opacity-0 md:opacity-0 md:hover:opacity-100 transition-opacity">
                  <button onclick="copyMessage('${msg.id}')" class="hover:text-primary"><i class="fa-regular fa-copy"></i></button>
                  <button onclick="regenerateMessage('${msg.id}')" class="hover:text-primary"><i class="fa-solid fa-rotate-right"></i></button>
                  <button onclick="reactMessage('${msg.id}','like')" class="hover:text-primary"><i class="fa-regular fa-thumbs-up"></i></button>
                  <button onclick="reactMessage('${msg.id}','dislike')" class="hover:text-primary"><i class="fa-regular fa-thumbs-down"></i></button>
                  <button onclick="shareMessage('${msg.id}')" class="hover:text-primary"><i class="fa-regular fa-share-from-square"></i></button>
                  <button onclick="toggleExpand('${msg.id}')" class="hover:text-primary"><i class="fa-regular fa-expand"></i></button>
                </div>
              </div>
            </div>
          `;
          if (window.innerWidth < 768) msgDiv.querySelector('.message-actions').classList.remove('opacity-0');
        }
        chatContainer.appendChild(msgDiv);
        // highlight code
        msgDiv.querySelectorAll('pre code').forEach(el => {
          hljs.highlightElement(el);
          const pre = el.parentNode;
          if (!pre.querySelector('.copy-code-btn')) {
            const btn = document.createElement('button');
            btn.className = 'copy-code-btn absolute top-2 right-2 text-xs bg-primary/20 px-2 py-1 rounded hover:bg-primary/40';
            btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
            btn.onclick = () => { navigator.clipboard.writeText(el.innerText); showToast('Code copied'); };
            pre.style.position = 'relative';
            pre.appendChild(btn);
          }
        });
      }

      // scroll
      function scrollToBottom() {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
      }

      // auto title generation
      function generateTitleFromMessage(text) {
        if (!text) return 'New chat';
        // remove common phrases
        let title = text.replace(/^(who is|what is|explain|tell me about|define)\s+/i, '');
        title = title.split(' ').slice(0,4).join(' ');
        title = title.charAt(0).toUpperCase() + title.slice(1);
        return title || 'New chat';
      }

      // send message
      async function sendMessage(prompt, images = null) {
        if (!prompt && (!images || !images.length)) return;
        const chat = currentChat();
        const isFirstMessage = chat.messages.length === 0;

        // handle edit mode
        if (editMode.active) {
          const newMsg = {
            id: 'msg-' + Date.now() + Math.random(),
            role: 'user',
            text: prompt,
            images: selectedImages.length ? selectedImages : null,
            timestamp: Date.now(),
            isEdited: true
          };
          chat.messages.splice(editMode.index + 1, 0, newMsg);
          cancelEdit();
        } else {
          const userMsg = {
            id: 'msg-' + Date.now() + Math.random(),
            role: 'user',
            text: prompt,
            images: selectedImages.length ? selectedImages : null,
            timestamp: Date.now()
          };
          chat.messages.push(userMsg);
          // auto title
          if (isFirstMessage) {
            chat.title = generateTitleFromMessage(prompt);
          }
        }

        saveChats();
        clearSelectedImages();
        appendMessage(chat.messages[chat.messages.length-1]); // append only the new user message
        scrollToBottom();
        messageInput.value = '';
        charCounter.textContent = '0 characters';
        updateSendButton();

        // check for image command
        if (/^\/image\s/.test(prompt)) {
          const imagePrompt = prompt.replace('/image ', '');
          const imgUrl = await generateImage(imagePrompt);
          if (imgUrl) {
            const assistantMsg = {
              id: 'msg-' + Date.now() + Math.random(),
              role: 'assistant',
              content: imgUrl,
              isImg: true,
              timestamp: Date.now()
            };
            chat.messages.push(assistantMsg);
            saveChats();
            appendMessage(assistantMsg);
            scrollToBottom();
          }
          return;
        }

        // stream AI
        await streamAIResponse(prompt, selectedImages);
      }

      async function streamAIResponse(prompt, images) {
        const chat = currentChat();
        const assistantMsg = {
          id: 'msg-' + Date.now() + Math.random(),
          role: 'assistant',
          content: '',
          timestamp: Date.now()
        };
        chat.messages.push(assistantMsg);
        saveChats();
        appendMessage(assistantMsg); // temporary, will be updated
        const msgDiv = chatContainer.lastElementChild;
        const proseDiv = msgDiv?.querySelector('.message-ai-content');
        if (!proseDiv) return;

        proseDiv.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        scrollToBottom();

        const apiMessages = [];
        if (chat.systemPrompt) apiMessages.push({ role: 'system', content: chat.systemPrompt });
        if (images && images.length) {
          apiMessages.push({
            role: 'user',
            content: [
              { type: 'text', text: prompt },
              ...images.map(img => ({ type: 'image_url', image_url: { url: img } }))
            ]
          });
        } else {
          apiMessages.push({ role: 'user', content: prompt });
        }

        abortController = new AbortController();
        setGenerating(true);

        let fullText = '';
        try {
          const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${StorageManager.getApiKey()}`,
              'Content-Type': 'application/json',
              'HTTP-Referer': window.location.origin,
            },
            body: JSON.stringify({
              model: StorageManager.getModel(),
              messages: apiMessages,
              stream: true
            }),
            signal: abortController.signal
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(l => l.trim());
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const jsonStr = line.slice(6);
                if (jsonStr === '[DONE]') continue;
                try {
                  const data = JSON.parse(jsonStr);
                  const delta = data.choices[0]?.delta?.content || '';
                  fullText += delta;
                  assistantMsg.content = fullText;
                  proseDiv.innerHTML = marked.parse(fullText);
                  scrollToBottom();
                } catch (e) {}
              }
            }
          }
        } catch (error) {
          if (error.name === 'AbortError') {
            assistantMsg.content = '⏹️ Generation stopped.';
          } else {
            assistantMsg.content = `⚠️ Error: ${error.message}`;
          }
          proseDiv.innerHTML = marked.parse(assistantMsg.content);
        } finally {
          setGenerating(false);
          saveChats();
          scrollToBottom();
        }
      }

      async function generateImage(prompt) {
        const engine = StorageManager.getImageEngine();
        if (engine === 'pollinations') {
          return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.random()}&nologo=true`;
        } else {
          if (!StorageManager.getApiKey()) { alert('API key required'); return null; }
          try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${StorageManager.getApiKey()}`,
                'Content-Type': 'application/json',
                'HTTP-Referer': location.origin,
              },
              body: JSON.stringify({
                model: 'black-forest-labs/flux-1.1-pro',
                messages: [{ role: 'user', content: prompt }],
                response_format: { type: 'url' }
              })
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            return data.choices[0]?.message?.content;
          } catch {
            alert('Image generation failed');
            return null;
          }
        }
      }

      // UI helpers
      function setGenerating(state) {
        isGenerating = state;
        if (state) {
          sendBtn.classList.add('hidden');
          stopBtn.classList.remove('hidden');
        } else {
          sendBtn.classList.remove('hidden');
          stopBtn.classList.add('hidden');
        }
      }

      function updateSendButton() {
        const hasText = messageInput.value.trim().length > 0;
        voiceBtn.classList.toggle('hidden', hasText);
        sendBtn.classList.toggle('hidden', !hasText);
      }

      messageInput.addEventListener('input', () => {
        charCounter.textContent = messageInput.value.length + ' characters';
        updateSendButton();
      });

      messageInput.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
          e.preventDefault();
          sendBtn.click();
        }
      });

      sendBtn.addEventListener('click', () => {
        sendMessage(messageInput.value.trim(), selectedImages);
      });

      stopBtn.addEventListener('click', () => {
        if (abortController) abortController.abort();
      });

      // attachments
      attachBtn.addEventListener('click', () => imageUpload.click());
      imageUpload.addEventListener('change', (e) => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => selectedImages.push(ev.target.result);
          reader.readAsDataURL(file);
        });
        imageUpload.value = '';
      });

      // ----- VOICE (fixed word repetition) -----
      let recognition = null;
      let finalTranscript = ''; // accumulates final results

      voiceBtn.addEventListener('click', () => {
        if (!('webkitSpeechRecognition' in window)) { alert('Not supported'); return; }
        voiceModal.classList.remove('hidden');
        finalTranscript = ''; // reset for new recording
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        recognition.onresult = (e) => {
          let interim = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
              finalTranscript += e.results[i][0].transcript + ' ';
            } else {
              interim += e.results[i][0].transcript;
            }
          }
          voiceTranscript.innerHTML = finalTranscript + '<span class="text-primary">' + interim + '</span>';
        };
        recognition.start();
      });

      window.stopVoiceRecording = () => {
        if (recognition) recognition.stop();
        // keep finalTranscript, don't reset
        closeVoiceModal();
      };
      window.cancelVoiceRecording = () => {
        if (recognition) recognition.abort();
        finalTranscript = ''; // discard
        closeVoiceModal();
      };
      window.insertVoiceText = () => {
        if (finalTranscript.trim()) {
          messageInput.value += (messageInput.value ? ' ' : '') + finalTranscript.trim();
          messageInput.dispatchEvent(new Event('input'));
        }
        finalTranscript = ''; // clear after insert
        closeVoiceModal();
      };
      function closeVoiceModal() {
        voiceModal.classList.add('hidden');
        if (recognition) recognition.abort();
        // do not reset finalTranscript here because stop already keeps it
      }

      // message actions
      window.copyMessage = (id) => {
        const msg = currentChat().messages.find(m => m.id === id);
        if (msg) { navigator.clipboard.writeText(msg.content || msg.text); showToast('Copied'); }
      };
      window.reactMessage = (id, type) => showToast(type === 'like' ? '👍' : type==='dislike' ? '👎' : '🔥');
      window.shareMessage = (id) => {
        if (navigator.share) {
          const msg = currentChat().messages.find(m => m.id === id);
          navigator.share({ title: 'Fox Chat', text: msg.content || msg.text });
        } else copyMessage(id);
      };
      window.toggleExpand = (id) => {
        const el = document.querySelector(`[data-id="${id}"] .message-ai-content`);
        if (el) el.classList.toggle('line-clamp-3');
      };
      window.zoomImage = (src) => {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-[10000] flex items-center justify-center';
        modal.innerHTML = `<img src="${src}" class="max-w-full max-h-full cursor-pointer" onclick="this.parentElement.remove()">`;
        document.body.appendChild(modal);
      };
      window.regenerateMessage = (id) => {
        const chat = currentChat();
        const idx = chat.messages.findIndex(m => m.id === id);
        if (idx === -1) return;
        let userIdx = -1;
        for (let i = idx-1; i>=0; i--) {
          if (chat.messages[i].role === 'user') { userIdx = i; break; }
        }
        if (userIdx === -1) return;
        const userMsg = chat.messages[userIdx];
        chat.messages = chat.messages.slice(0, userIdx+1);
        saveChats();
        renderMessages(); // full re-render after truncation (acceptable here)
        streamAIResponse(userMsg.text || userMsg.content, userMsg.images);
      };

      // edit
      window.editMessage = (id) => {
        const chat = currentChat();
        const idx = chat.messages.findIndex(m => m.id === id);
        if (idx === -1) return;
        const msg = chat.messages[idx];
        if (msg.role !== 'user') return;
        editMode = { active: true, messageId: id, index: idx };
        messageInput.value = msg.text || msg.content;
        messageInput.focus();
        editIndicator.classList.remove('hidden');
        renderMessages(); // re-render to highlight
      };
      window.cancelEdit = () => {
        editMode = { active: false, messageId: null, index: -1 };
        messageInput.value = '';
        editIndicator.classList.add('hidden');
        renderMessages();
      };

      // themes
      window.setTheme = (t) => {
        document.body.className = t;
        StorageManager.setTheme(t);
      };

      // settings
      window.toggleSettings = () => {
        settingsModal.classList.toggle('hidden');
        if (!settingsModal.classList.contains('hidden')) {
          apiKeyInput.value = StorageManager.getApiKey();
          modelInput.value = StorageManager.getModel();
          imageEngineSelect.value = StorageManager.getImageEngine();
        }
      };
      window.saveSettings = () => {
        StorageManager.setApiKey(apiKeyInput.value.trim());
        StorageManager.setModel(modelInput.value.trim());
        StorageManager.setImageEngine(imageEngineSelect.value);
        headerModel.textContent = StorageManager.getModel().split('/').pop().replace(':free','').slice(0,20) || 'custom';
        showToast('Settings saved');
        toggleSettings();
      };

      // system prompt
      window.openSystemModal = () => {
        systemInput.value = StorageManager.getSystemPrompt(currentChatId);
        systemModal.classList.remove('hidden');
      };
      window.closeSystemModal = () => systemModal.classList.add('hidden');
      window.saveSystemPrompt = () => {
        StorageManager.saveSystemPrompt(currentChatId, systemInput.value);
        closeSystemModal();
      };

      // sidebar toggle
      window.toggleSidebar = (open) => {
        document.getElementById('sidebar').classList.toggle('sidebar-hidden', !open);
      };

      // export
      window.exportChatTxt = () => {
        const chat = currentChat();
        const text = chat.messages.map(m => `${m.role}: ${m.text || m.content}`).join('\n\n');
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${chat.title}.txt`;
        a.click();
      };

      // clear selected images (dummy)
      function clearSelectedImages() {
        selectedImages = [];
      }

      // init
      renderChatList();
      renderMessages();
      headerModel.textContent = StorageManager.getModel().split('/').pop().replace(':free','').slice(0,20) || 'custom';
    })();
  </script>
</body>
</html>
