<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fox Chat · Premium SaaS</title>
    
    <!-- Tailwind + Marked + Font Awesome + Highlight.js -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <!-- PWA manifest (will be created dynamically) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">

    <style>
        /* Custom animations and overrides */
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg-dark: #0a0a0b;
            --bg-light: #f9fafb;
            --glass-bg: rgba(20, 20, 22, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* Theme classes */
        .theme-light {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg-dark: #ffffff;
            --bg-light: #f3f4f6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            color-scheme: light;
        }
        .theme-dark {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg-dark: #0a0a0b;
            --bg-light: #1f1f23;
            --glass-bg: rgba(20, 20, 22, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            color-scheme: dark;
        }
        .theme-glass {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg-dark: transparent;
            --bg-light: rgba(255,255,255,0.05);
            --glass-bg: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
        }
        .theme-purple {
            --primary: #a78bfa;
            --primary-dark: #8b5cf6;
            --bg-dark: #1e1b4b;
            --bg-light: #2e2b5e;
            --glass-bg: rgba(168, 139, 250, 0.2);
            --glass-border: rgba(168, 139, 250, 0.3);
        }
        .theme-ocean {
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --bg-dark: #164e63;
            --bg-light: #155e75;
            --glass-bg: rgba(6, 182, 212, 0.2);
            --glass-border: rgba(6, 182, 212, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            transition: background 0.3s, color 0.3s;
            overflow: hidden;
        }
        .theme-light body {
            background: var(--bg-light);
            color: #111827;
        }

        /* Glass effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        /* Message bubbles */
        .message-user {
            background: var(--primary);
            color: white;
            border-radius: 1.5rem 1.5rem 0 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }
        .message-ai {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem 1.5rem 1.5rem 0;
            color: #e5e7eb;
        }
        .theme-light .message-ai {
            background: white;
            color: #111827;
            border-color: #e5e7eb;
        }

        /* Edit mode highlight */
        .editing-message {
            outline: 2px solid var(--primary);
            outline-offset: 4px;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.3s ease-out forwards; }

        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-slow { animation: pulse 2s infinite; }

        /* Typing indicator */
        .typing-dots span {
            width: 8px; height: 8px; margin: 0 2px; background: var(--primary); border-radius: 50%;
            display: inline-block; animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Context menu */
        .context-menu {
            background: #1e1e24; border: 1px solid var(--primary); border-radius: 1rem;
            padding: 0.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 300;
        }

        /* Toast */
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: #1e1e24; color: white; padding: 0.75rem 1.5rem; border-radius: 2rem;
            font-size: 0.9rem; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 1000;
            transition: opacity 0.3s; opacity: 0; pointer-events: none;
            border: 1px solid var(--primary); backdrop-filter: blur(10px);
        }
        .toast-show { opacity: 1 !important; }

        /* Image preview grid */
        .image-preview-grid {
            display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;
        }
        .image-preview-item {
            position: relative; width: 80px; height: 80px; border-radius: 0.75rem;
            overflow: hidden; border: 2px solid var(--primary);
        }
        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview-item button {
            position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7);
            border: none; color: white; width: 20px; height: 20px; border-radius: 50%;
            font-size: 12px; cursor: pointer;
        }
    </style>
</head>
<body class="h-[100dvh] flex flex-col">
    <div id="toast">✨ Copied</div>

    <!-- PIN Lock Modal -->
    <div id="pinModal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[10000] hidden">
        <div class="glass w-96 p-8 rounded-[2rem] text-center">
            <h2 class="text-2xl font-bold mb-4">Enter PIN</h2>
            <input type="password" id="pinInput" maxlength="4" class="w-full bg-white/10 border border-white/20 rounded-xl p-4 text-center text-2xl tracking-widest outline-none focus:border-primary mb-4" placeholder="****">
            <button onclick="unlockApp()" class="w-full py-3 bg-primary text-white font-bold rounded-xl">Unlock</button>

    <!-- Settings Modal (with API, model, toggles, etc.) -->
    <div id="settings-modal" class="fixed inset-0 flex items-center justify-center p-4 z-[1000] hidden">

        <div class="glass w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 rounded-[2rem] relative z-10">
            <h3 class="text-xl font-black mb-2 text-primary uppercase">Settings</h3>
            <div class="space-y-4">
                <!-- API Key -->
                <div>
                    <label class="text-gray-400 text-xs block mb-1">OpenRouter API Key</label>
                    <div class="flex gap-2">

                        <button onclick="toggleApiKeyVisibility()" class="px-4 bg-white/10 rounded-xl"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>
                <!-- Custom Model -->
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Custom Model ID</label>
                    <input type="text" id="custom-model-input" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-primary" placeholder="e.g. google/gemini-2.0-flash-exp:free">
                </div>
                <!-- Image Engine -->
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Image Generation Engine</label>
                    <select id="image-engine-select" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-primary">
                        <option value="pollinations">Pollinations (free)</option>
                        <option value="openrouter">OpenRouter (uses API key)</option>
                    </select>
                </div>
                <!-- AI Parameters -->
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Temperature <span id="tempValue">0.7</span></label>
                    <input type="range" id="temperatureSlider" min="0" max="2" step="0.1" value="0.7" class="w-full">
                </div>
                <div>
                    <label class="text-gray-400 text-xs block mb-1">Max Tokens <span id="maxTokensValue">2048</span></label>
                    <input type="range" id="maxTokensSlider" min="256" max="4096" step="256" value="2048" class="w-full">
                </div>
                <!-- Toggles -->
                <div class="flex items-center justify-between">
                    <span class="text-sm">Agent Mode</span>
                    <button id="agentModeToggle" class="w-12 h-6 rounded-full bg-gray-600 relative transition-colors">
                        <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform"></span>
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm">Web Search</span>
                    <button id="webSearchToggle" class="w-12 h-6 rounded-full bg-gray-600 relative transition-colors">
                        <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform"></span>
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm">Memory</span>
                    <button id="memoryToggle" class="w-12 h-6 rounded-full bg-gray-600 relative transition-colors">
                        <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform"></span>
                    </button>
                </div>
                <!-- PIN Lock -->
                <div class="flex items-center justify-between">
                    <span class="text-sm">PIN Lock (4 digits)</span>
                    <input type="password" id="pinLockInput" maxlength="4" class="w-24 bg-white/5 border border-white/10 rounded-xl p-2 text-center" placeholder="****">
                </div>
                <!-- Hide API Key Toggle -->
                <div class="flex items-center justify-between">
                    <span class="text-sm">Hide API Key in localStorage</span>
                    <button id="hideApiKeyToggle" class="w-12 h-6 rounded-full bg-gray-600 relative transition-colors">
                        <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform"></span>
                    </button>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="saveSettings()" class="flex-1 py-3 bg-primary text-black font-bold rounded-xl hover:scale-105 transition-all">Save</button>
                <button onclick="toggleSettings()" class="flex-1 py-3 bg-white/10 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <!-- System Prompt Modal -->
    <div id="systemPromptModal" class="fixed inset-0 flex items-center justify-center p-4 hidden z-[1000]">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeSystemPromptModal()"></div>
        <div class="glass w-full max-w-md p-8 rounded-[2rem] relative z-10">
            <h3 class="text-xl font-black mb-4 text-primary">System prompt</h3>
            <textarea id="systemPromptInput" rows="5" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-primary mb-4" placeholder="You are a helpful assistant..."></textarea>
            <div class="flex gap-2">
                <button onclick="saveSystemPrompt()" class="flex-1 py-3 bg-primary text-black font-bold rounded-xl">Save</button>
                <button onclick="closeSystemPromptModal()" class="flex-1 py-3 bg-white/10 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Main layout -->
    <div class="flex h-full w-full relative">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="w-80 h-full glass absolute md:relative -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col p-6 z-50 overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <img src="https://t3.ftcdn.net/jpg/08/63/01/66/360_F_863016640_fdXeQ7Olm2XJv7BulETweOBaRlUg4lLL.jpg" class="w-8 h-8 rounded-lg animate-pulse-slow">
                    <h2 class="text-primary font-black tracking-tighter text-xl">FOX CHAT</h2>
                </div>
                <button onclick="toggleSidebar(false)" class="md:hidden text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            </div>

            <!-- Search & Filters -->
            <div class="mb-4">
                <input type="text" id="chatSearch" placeholder="Search chats..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-primary">
            </div>
            <div class="flex gap-1 mb-4 text-xs">
                <button onclick="filterChats('all')" class="px-3 py-1 rounded-full bg-white/10 hover:bg-primary/30">All</button>
                <button onclick="filterChats('today')" class="px-3 py-1 rounded-full bg-white/10 hover:bg-primary/30">Today</button>
                <button onclick="filterChats('yesterday')" class="px-3 py-1 rounded-full bg-white/10 hover:bg-primary/30">Yesterday</button>
                <button onclick="filterChats('week')" class="px-3 py-1 rounded-full bg-white/10 hover:bg-primary/30">Week</button>
            </div>

            <!-- Folders -->
            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Folders</span>
                    <button onclick="createFolder()" class="text-primary text-sm"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="folderList" class="space-y-1 max-h-32 overflow-y-auto"></div>
            </div>

            <!-- Chats list -->
            <div class="flex-1 overflow-y-auto" id="chat-list-container">
                <div id="chat-list" class="space-y-1"></div>
            </div>

            <!-- Storage indicator -->
            <div class="mt-4 pt-4 border-t border-white/10">
                <div class="text-xs text-gray-400 mb-1">Storage used: <span id="storageUsed">0 KB</span></div>
                <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                    <div id="storageBar" class="h-full bg-primary" style="width:0%"></div>
                </div>
            </div>

            <!-- Bottom buttons -->
            <div class="mt-4 space-y-2">
                <button onclick="openSystemPromptModal()" class="w-full p-3 rounded-xl bg-white/5 hover:border-primary/30 transition-all flex items-center gap-3">
                    <i class="fa-regular fa-message text-primary"></i>
                    <span class="text-xs font-bold uppercase">System Prompt</span>
                </button>
                <button onclick="toggleSettings()" class="w-full p-3 rounded-xl bg-white/5 hover:border-primary/30 transition-all flex items-center gap-3">
                    <i class="fa-solid fa-sliders text-primary"></i>
                    <span class="text-xs font-bold uppercase">Settings</span>
                </button>
                <!-- Theme switcher -->
                <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                    <span class="text-xs font-bold uppercase">Theme</span>
                    <select id="themeSelect" onchange="setTheme(this.value)" class="bg-transparent text-xs border border-white/10 rounded-lg p-1">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                        <option value="glass">Glass</option>
                        <option value="purple">Purple</option>
                        <option value="ocean">Ocean</option>
                    </select>
                </div>
                <!-- Compact mode -->
                <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                    <span class="text-xs font-bold uppercase">Compact</span>
                    <button onclick="toggleCompactMode()" class="w-10 h-5 rounded-full bg-gray-600 relative transition-colors">
                        <span id="compactToggle" class="absolute left-0.5 top-0.5 w-4 h-4 bg-primary rounded-full shadow transition-transform"></span>
                    </button>
                </div>
                <!-- Lock app -->
                <button onclick="lockApp()" class="w-full p-3 rounded-xl bg-white/5 hover:border-primary/30 transition-all flex items-center gap-3">
                    <i class="fa-solid fa-lock text-primary"></i>
                    <span class="text-xs font-bold uppercase">Lock App</span>
                </button>
            </div>
        </aside>

        <!-- MAIN CHAT -->
        <main class="flex-1 flex flex-col h-full relative min-w-0">
            <header class="p-4 flex items-center justify-between z-40 glass border-b border-white/10">
                <button onclick="toggleSidebar(true)" class="p-2 bg-white/5 rounded-xl md:hidden"><i class="fa-solid fa-bars-staggered text-primary"></i></button>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-gray-400 uppercase" id="header-model">Custom model</span>
                    <span id="tokenCounter" class="text-xs bg-primary/20 px-2 py-1 rounded-full">0 tokens</span>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleFullscreen()" class="p-2 hover:bg-white/5 rounded-xl"><i class="fa-regular fa-window-maximize text-primary"></i></button>
                    <button onclick="scrollToBottom()" class="p-2 hover:bg-white/5 rounded-xl"><i class="fa-regular fa-circle-down text-primary"></i></button>
                </div>
            </header>

            <!-- Chat messages container -->
            <div id="chat-container" class="flex-1 overflow-y-auto px-4 md:px-8 py-6 space-y-4 scroll-smooth"></div>

                        <!-- Edit indicator -->
            <div id="editIndicator" class="hidden px-4 md:px-8 py-2 flex items-center gap-2 text-sm text-primary bg-primary/10 border-t border-primary/20">
                <i class="fa-regular fa-pen-to-square"></i> Editing message... 
                <button onclick="cancelEdit()" class="ml-auto text-xs bg-white/10 px-3 py-1 rounded-full">Cancel</button>
            </div>

            <!-- INPUT AREA -->
            <div class="p-4 md:px-8 pb-6">
                <div class="max-w-4xl mx-auto glass p-4 rounded-[2rem]">
                    <!-- Image preview grid -->
                    <div id="imagePreviewGrid" class="image-preview-grid hidden"></div>
                    
                    <!-- Input row -->
                    <div class="flex items-end gap-2">
                        <button id="attachBtn" class="p-3 text-primary hover:bg-white/5 rounded-full transition-all">
                            <i class="fa-regular fa-image text-2xl"></i>
                        </button>
                        <button id="emojiBtn" class="p-3 text-primary hover:bg-white/5 rounded-full transition-all">
                            <i class="fa-regular fa-face-smile text-2xl"></i>
                        </button>
                        <button id="voiceBtn" class="p-3 text-primary hover:bg-white/5 rounded-full transition-all">

                        </button>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500 mt-2">
                        <span id="charCounter">0 characters</span>
                        <span>Ctrl+Enter to send</span>
                    </div>
                </div>

        </main>

    <!-- Floating action button (mobile) -->
    <button id="fab" onclick="toggleSidebar(true)" class="fixed bottom-20 right-4 w-14 h-14 bg-primary rounded-full shadow-2xl flex items-center justify-center md:hidden z-50">
        <i class="fa-solid fa-bars-staggered text-black text-xl"></i>
    </button>

    <!-- Hidden file input -->
    <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">

    <!-- Emoji picker (simple) -->

        <span class="text-2xl cursor-pointer hover:scale-125 transition" onclick="insertEmoji('😊')">😊</span>
        <span class="text-2xl cursor-pointer hover:scale-125 transition" onclick="insertEmoji('😂')">😂</span>
        <span class="text-2xl cursor-pointer hover:scale-125 transition" onclick="insertEmoji('❤️')">❤️</span>
        <span class="text-2xl cursor-pointer hover:scale-125 transition" onclick="insertEmoji('👍')">👍</span>
        <span class="text-2xl cursor-pointer hover:scale-125 transition" onclick="insertEmoji('🔥')">🔥</span>
        <span class="text-2xl cursor-pointer hover:scale-125 transition" onclick="insertEmoji('🎉')">🎉</span>
    </div>

    <script>
        (function() {
            // ---------- STATE ----------
            let chats = [];
            let currentChatId = null;
            let apiKey = localStorage.getItem('FOX_KEY_STORAGE') || '';
            let customModel = localStorage.getItem('FOX_CUSTOM_MODEL') || 'google/gemini-2.0-flash-exp:free';
            let imageEngine = localStorage.getItem('FOX_IMAGE_ENGINE') || 'pollinations';
            let darkMode = localStorage.getItem('darkMode') !== 'false';
            let selectedImages = []; // array of base64
            let editMode = { active: false, messageId: null, index: -1, originalText: '' };
            let folders = JSON.parse(localStorage.getItem('folders') || '[{"id":"default","name":"General","chatIds":[]}]');
            let pinnedChats = JSON.parse(localStorage.getItem('pinnedChats') || '[]');
            let tags = JSON.parse(localStorage.getItem('tags') || '{}');
            let theme = localStorage.getItem('theme') || 'dark';
            let compactMode = localStorage.getItem('compactMode') === 'true';
            let pinCode = localStorage.getItem('pinCode') || '';
            let hideApiKey = localStorage.getItem('hideApiKey') === 'true';
            let agentMode = false, webSearch = false, memory = true;
            let temperature = 0.7, maxTokens = 2048;

            // DOM elements
            const chatContainer = document.getElementById('chat-container');
            const inputField = document.getElementById('chat-input');
            const sendBtn = document.getElementById('btn-send');
            const settingsModal = document.getElementById('settings-modal');
            const apiKeyInput = document.getElementById('api-key-input');
            const customModelInput = document.getElementById('custom-model-input');
            const imageEngineSelect = document.getElementById('image-engine-select');
            const headerModel = document.getElementById('header-model');
            const chatListEl = document.getElementById('chat-list');
            const systemModal = document.getElementById('systemPromptModal');
            const systemInput = document.getElementById('systemPromptInput');
            const attachBtn = document.getElementById('attachBtn');
            const imageUpload = document.getElementById('imageUpload');
            const imagePreviewGrid = document.getElementById('imagePreviewGrid');
            const toast = document.getElementById('toast');
            const editIndicator = document.getElementById('editIndicator');
            const pinModal = document.getElementById('pinModal');
            const pinInput = document.getElementById('pinInput');
            const themeSelect = document.getElementById('themeSelect');
            const storageUsedSpan = document.getElementById('storageUsed');
            const storageBar = document.getElementById('storageBar');
            const tokenCounter = document.getElementById('tokenCounter');
            const temperatureSlider = document.getElementById('temperatureSlider');
            const maxTokensSlider = document.getElementById('maxTokensSlider');
            const tempValue = document.getElementById('tempValue');
            const maxTokensValue = document.getElementById('maxTokensValue');
            const charCounter = document.getElementById('charCounter');

            // Load chats
            function loadChats() {

            // Send message (handles edit mode)
            async function sendMessage(prompt, images = null) {
                if (!prompt && (!images || images.length === 0)) return;

                const chat = currentChat();

                if (editMode.active) {
                    // Create new user message with edited content
                    const newMsg = {
                        id: 'msg-' + Date.now() + Math.random(),
                        role: 'user',
                        text: prompt,
                        images: selectedImages.length ? selectedImages : null,
                        timestamp: Date.now(),
                        isEdited: true
                    };
                    chat.messages.splice(editMode.index + 1, 0, newMsg);
                    cancelEdit();
                } else {
                    // Normal send
                    const userMsg = {
                        id: 'msg-' + Date.now() + Math.random(),
                        role: 'user',
                        text: prompt,
                        images: selectedImages.length ? selectedImages : null,
                        timestamp: Date.now()
                    };
                    chat.messages.push(userMsg);
                }

                saveChats();
                clearSelectedImages();
                renderChat();

                // Check for image generation command
                if (/^\/image\s/.test(prompt)) {
                    const imagePrompt = prompt.replace('/image ', '');
                    const imgUrl = await generateImage(imagePrompt);
                    if (imgUrl) {
                        chat.messages.push({
                            id: 'msg-' + Date.now() + Math.random(),
                            role: 'assistant',
                            content: imgUrl,
                            isImg: true,
                            timestamp: Date.now()
                        });
                        saveChats();
                        renderChat();
                    }
                    return;
                }

                // Regular AI response
                await streamAIResponse(prompt, selectedImages);
            }

            // Streaming AI response
            async function streamAIResponse(prompt, images) {
                const chat = currentChat();
                const assistantMsg = {
                    id: 'msg-' + Date.now() + Math.random(),
                    role: 'assistant',
                    content: '',
                    timestamp: Date.now()
                };
                chat.messages.push(assistantMsg);
                saveChats();
                renderChat();

                const lastDiv = chatContainer.lastElementChild;
                const proseDiv = lastDiv?.querySelector('.message-ai-content');
                if (!proseDiv) return;

                // Thinking indicator
                proseDiv.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

                // Build API messages
                const apiMessages = [];
                if (chat.systemPrompt) apiMessages.push({ role: 'system', content: chat.systemPrompt });
                if (images && images.length) {
                    apiMessages.push({
                        role: 'user',
                        content: [
                            { type: 'text', text: prompt },
                            ...images.map(img => ({ type: 'image_url', image_url: { url: img } }))
                        ]
                    });
                } else {
                    apiMessages.push({ role: 'user', content: prompt });
                }

                let fullText = '';
                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.origin,
                        },
                        body: JSON.stringify({
                            model: customModel,
                            messages: apiMessages,
                            stream: true,
                            temperature: temperature,
                            max_tokens: maxTokens
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n').filter(l => l.trim() !== '');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const jsonStr = line.slice(6);
                                if (jsonStr === '[DONE]') continue;
                                try {
                                    const data = JSON.parse(jsonStr);
                                    const delta = data.choices[0]?.delta?.content || '';
                                    fullText += delta;
                                    assistantMsg.content = fullText;
                                    proseDiv.innerHTML = marked.parse(fullText);
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                } catch (e) {}
                            }
                        }
                    }
                } catch (error) {
                    assistantMsg.content = `⚠️ Error: ${error.message}`;
                    proseDiv.innerHTML = marked.parse(assistantMsg.content);
                } finally {
                    saveChats();
                    renderChat();
                }
            }

            // Image generation
            async function generateImage(prompt) {
                if (imageEngine === 'pollinations') {
                    return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.random()}&nologo=true`;
                } else {
                    if (!apiKey) { alert('API key required'); return null; }
                    try {
                        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${apiKey}`,
                                'Content-Type': 'application/json',
                                'HTTP-Referer': window.location.origin,
                            },
                            body: JSON.stringify({
                                model: 'black-forest-labs/flux-1.1-pro',
                                messages: [{ role: 'user', content: prompt }],
                                response_format: { type: 'url' }
                            })
                        });
                        if (!response.ok) throw new Error();
                        const data = await response.json();
                        return data.choices[0]?.message?.content;
                    } catch (e) {
                        alert('Image generation failed');
                        return null;
                    }
                }
                        }

                });
            }

            function renderImagePreviews() {
                imagePreviewGrid.innerHTML = '';
                selectedImages.forEach((img, i) => {
                    const item = document.createElement('div');
                    item.className = 'image-preview-item';
                    item.innerHTML = `<img src="${img}"><button onclick="removeImage(${i})">✕</button>`;
                    imagePreviewGrid.appendChild(item);
                });
                if (selectedImages.length) {
                    imagePreviewGrid.classList.remove('hidden');
                } else {
                    imagePreviewGrid.classList.add('hidden');
                }
            }

            window.removeImage = function(index) {
                selectedImages.splice(index, 1);
                renderImagePreviews();
            };

            // Character counter
            inputField.addEventListener('input', () => {
                charCounter.textContent = inputField.value.length + ' characters';
            });

            // Keyboard shortcut
            inputField.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            // Fullscreen
            window.toggleFullscreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            };

            // Scroll to bottom
            window.scrollToBottom = function() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };

            // Initialize
            function renderAll() {
                renderChatList();
                renderChat();
                renderFolders();
                updateHeaderModel();
            }

            // Event listeners
            sendBtn.addEventListener('click', () => {
                const prompt = inputField.value.trim();
                inputField.value = '';
                sendMessage(prompt, selectedImages);
            });

            attachBtn.addEventListener('click', () => imageUpload.click());
            imageUpload.addEventListener('change', (e) => {
                handleImageFiles(Array.from(e.target.files));
                imageUpload.value = '';
            });

            window.toggleSidebar = (open) => {
                const sidebar = document.getElementById('sidebar');
                if (open) {
                    sidebar.classList.remove('-translate-x-full');
                    document.getElementById('sidebarOverlay')?.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    document.getElementById('sidebarOverlay')?.classList.add('hidden');
                }
            };

            window.toggleSettings = () => {
                settingsModal.classList.toggle('hidden');
                if (!settingsModal.classList.contains('hidden')) {
                    apiKeyInput.value = hideApiKey && apiKey ? atob(apiKey) : apiKey;
                    customModelInput.value = customModel;
                    imageEngineSelect.value = imageEngine;
                    temperatureSlider.value = temperature;
                    maxTokensSlider.value = maxTokens;
                    tempValue.textContent = temperature;
                    maxTokensValue.textContent = maxTokens;
                }
            };

            window.openSystemPromptModal = () => {
                systemInput.value = currentChat().systemPrompt || '';
                systemModal.classList.remove('hidden');
            };
            window.closeSystemPromptModal = () => systemModal.classList.add('hidden');
            window.saveSystemPrompt = () => {
                currentChat().systemPrompt = systemInput.value;
                saveChats();
                closeSystemPromptModal();
            };

            // Sliders
            temperatureSlider.addEventListener('input', () => {
                tempValue.textContent = temperatureSlider.value;
            });
            maxTokensSlider.addEventListener('input', () => {
                maxTokensValue.textContent = maxTokensSlider.value;
            });

            renderAll();

            // Auto-lock after inactivity
            let timeout;
            function resetTimeout() {
                clearTimeout(timeout);
                if (pinCode) {
                    timeout = setTimeout(() => lockApp(), 60000); // 1 min
                }
            }
            window.addEventListener('mousemove', resetTimeout);
            resetTimeout();
        })();
    </script>
</body>
</html>
